name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout outer template
        uses: actions/checkout@v4
        with:
          repository: DenrianWeiss/specs-net-app
          path: template

      - name: Checkout content repo
        uses: actions/checkout@v4
        with:
          path: content

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: template/package-lock.json

      - name: Install dependencies
        working-directory: template
        run: npm ci

      - name: Copy content to template
        run: |
          cp -r content/* template/
          # Preserve content directory structure for products
          mkdir -p template/content
          cp -r content/content/* template/content/ 2>/dev/null || true

      - name: Build static site
        working-directory: template
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=panduspec --branch=main
